<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Anemify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: #ffffff; color: #000000; }
      .login-container { max-width: 400px; margin: 5rem auto; }
      .form-control { border: 1px solid #000000; }
      .form-control:focus { border-color: #000000; box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.25); }
      .btn-primary {
        background-color: #ffffff !important;
        border: 1px solid #000000 !important;
        color: #000000 !important;
      }
      .btn-primary:hover {
        background-color: #f2f2f2 !important;
      }
      .btn-black {
        background-color: #000000 !important;
        border-color: #000000 !important;
        color: #ffffff !important;
      }
      .btn-black:hover {
        background-color: #111111 !important;
      }
      a { color: #000000; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2 class="mb-4 text-center">Login</h2>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      
      <form method="POST" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-black w-100">Login</button>
      </form>
      
      <p class="text-center mt-3">Belum punya akun? <a href="/register">Daftar di sini</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
